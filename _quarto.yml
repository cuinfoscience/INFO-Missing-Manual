project:
  type: book
  output-dir: book
  resources:
    - graphics/**

book:
  title: "Missing Manual for Information Scientists"
  subtitle: "The hidden curriculum of computing technologies"
  author:
    - "Brian C. Keegan"
  date: today
  date-format: "MMMM YYYY"
  search: true
  repo-url: https://github.com/brianckeegan/ParatechnicalComputingHandbook
  repo-branch: main
  repo-actions: [edit, issue]
  sharing: [linkedin]
  sidebar:
    style: docked
    collapse-level: 2

  chapters:
    - index.qmd

    - part: "Part I — Practice of Technical Work"
      chapters:
        - parts/part-1-practice/questions.qmd
        - parts/part-1-practice/documentation.qmd
        - parts/part-1-practice/common-formats.qmd
        - parts/part-1-practice/reading-docs.qmd
        - parts/part-1-practice/debugging.qmd
        - parts/part-1-practice/tracebacks.qmd
        - parts/part-1-practice/artifacts-have-politics.qmd

    - part: "Part II — Computing Environment"
      chapters:
        - parts/part-2-environment/operating-system.qmd
        - parts/part-2-environment/file-system.qmd
        - parts/part-2-environment/terminal.qmd
        - parts/part-2-environment/text-editors.qmd
        - parts/part-2-environment/remote.qmd

    - part: "Part III — Python Management"
      chapters:
        - parts/part-3-python/package-management.qmd
        - parts/part-3-python/virtual-environments.qmd
        - parts/part-3-python/jupyter.qmd
        - parts/part-3-python/scripting.qmd
        - parts/part-3-python/regex.qmd
        - parts/part-3-python/linting.qmd

    - part: "Part IV — Working with Data"
      chapters:
        - parts/part-4-data/data-file-formats.qmd
        - parts/part-4-data/tabular-data.qmd
        - parts/part-4-data/pandas-basics.qmd
        - parts/part-4-data/sql-basics.qmd
        - parts/part-4-data/http-apis.qmd

    - part: "Part V — Project Management"
      chapters:
        - parts/part-5-projects/project-management.qmd
        - parts/part-5-projects/version-control.qmd
        - parts/part-5-projects/collaboration.qmd
        - parts/part-5-projects/automation.qmd
        - parts/part-5-projects/secrets.qmd

    - part: "Part VI — Algorithmic Systems"
      chapters:
        - parts/part-6-algorithmic/ai-llm.qmd
        - parts/part-6-algorithmic/llm-internals.qmd
        - parts/part-6-algorithmic/ai-agents.qmd
        - parts/part-6-algorithmic/evaluating-ai.qmd

    - conclusion.qmd

  appendices:
    - appendix-glossary.qmd
    - appendix-ai-disclosure.qmd

# Books inherit most website options from `book:`, but Quarto 1.9 routes
# `llms-txt` through the website config specifically. Declaring a sibling
# `website:` block with only this key makes llms.txt / .llms.md generation work.
website:
  llms-txt: true

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 2
    code-copy: true
    code-overflow: wrap
    code-block-bg: true
    reference-location: margin
    citation-location: margin
    fig-cap-location: margin
    link-external-icon: true
    link-external-newwindow: true